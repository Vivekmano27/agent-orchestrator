# Solo Dev Orchestrator — GitHub Actions CI/CD Pipeline
# Place in: .github/workflows/ci.yml

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  FLUTTER_VERSION: '3.x'

jobs:
  # ---- Lint & Type Check (fast fail) ----
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [core-service, api-gateway, ai-service, web]
    steps:
      - uses: actions/checkout@v4

      - name: Lint NestJS services
        if: matrix.service != 'ai-service'
        run: |
          cd services/${{ matrix.service }} 2>/dev/null || cd apps/${{ matrix.service }}
          npm ci
          npm run lint

      - name: Lint Python service
        if: matrix.service == 'ai-service'
        run: |
          cd services/ai-service
          pip install ruff mypy
          ruff check .
          mypy . --ignore-missing-imports

  # ---- Unit Tests (parallel per service) ----
  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_DB: test_db, POSTGRES_USER: test, POSTGRES_PASSWORD: test }
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s
    strategy:
      matrix:
        service: [core-service, api-gateway, ai-service, web]
    steps:
      - uses: actions/checkout@v4

      - name: Test NestJS
        if: matrix.service != 'ai-service'
        run: |
          cd services/${{ matrix.service }} 2>/dev/null || cd apps/${{ matrix.service }}
          npm ci
          npm test -- --coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db

      - name: Test Python
        if: matrix.service == 'ai-service'
        run: |
          cd services/ai-service
          pip install -r requirements.txt
          pytest --cov --cov-report=xml
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db

  # ---- E2E Tests ----
  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start services
        run: docker-compose up -d --build
      - name: Wait for services
        run: sleep 30
      - name: Run Playwright
        run: |
          cd apps/web
          npm ci
          npx playwright install --with-deps
          npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-report, path: apps/web/playwright-report/ }

  # ---- Security Scan ----
  security:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          cd services/core-service && npm audit --audit-level=high
          cd ../ai-service && pip install pip-audit && pip-audit

  # ---- Deploy to Staging ----
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: [test, e2e, security]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: echo "Deploy to ECS staging"

  # ---- Deploy to Production ----
  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: [test, e2e, security]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: echo "Deploy to ECS production"
